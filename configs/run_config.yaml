model:
  name: google_genai:gemini-3.1-flash-lite-preview
  temperature: 0.7
  max_retries: 4

prompts:
  main_system: prompts/main_system.md
  main_system_without_shacl: prompts/main_system_without_shacl.md
  main_user: prompts/main_user.md
  translation_system: prompts/translation_system.md
  translation_user: prompts/translation_user.md
  not_typed: prompts/not_typed.md

runtime:
  delay_seconds: 4.0
  prompt_caching_enabled: false
  max_iterations: 20
  min_iterations: 0
  violation_translation: true
  shacl_validation: true
  same_data_graph: true
  async: false

output:
  base_dir: results
  custom_tag: royalty
  run_dir: results/royalty_gemini_flash_lite_test

dataset:
  source: custom_family_bench
